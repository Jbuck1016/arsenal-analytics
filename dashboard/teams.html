<!DOCTYPE html>
<html lang="en" class="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Team Profiles</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Archivo:wght@600;700;800&family=Inter:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<style>
:root{--accent:#C39E6D;--accent-dim:rgba(195,158,109,.10);--accent-glow:rgba(195,158,109,.22);
 --bg:#f5f4f1;--bg2:#fff;--bg3:#fafaf8;--surface:rgba(0,0,0,.025);--surface2:rgba(0,0,0,.05);
 --border:#e8e5e0;--border2:#d5d2cc;--text:#1a1a18;--text2:#5a5856;--text3:#9a9894;
 --elite:#16a34a;--above:#4ade80;--avg:#d4a017;--below:#f97316;--poor:#dc2626;--shadow:0 1px 3px rgba(0,0,0,.07)}
html.dark{--accent:#D8B384;--accent-dim:rgba(216,179,132,.12);--accent-glow:rgba(216,179,132,.28);
 --bg:#0d0f14;--bg2:#161920;--bg3:#1e222b;--surface:rgba(255,255,255,.035);--surface2:rgba(255,255,255,.07);
 --border:#272b35;--border2:#3a3f4b;--text:#f4f6fb;--text2:#b9c3db;--text3:#8b97b4;
 --elite:#34d399;--above:#6ee7a8;--avg:#fbbf24;--below:#fb923c;--poor:#f87171;--shadow:0 1px 3px rgba(0,0,0,.35)}
*{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;background:var(--bg);color:var(--text);font-family:'Inter',system-ui,sans-serif}
body{display:flex;flex-direction:column;overflow:hidden}
.hdr{height:52px;background:var(--bg2);border-bottom:1px solid var(--border);display:flex;align-items:center;padding:0 18px;gap:14px;flex-shrink:0;box-shadow:var(--shadow);z-index:10}
.hdr-logo{width:32px;height:32px;border-radius:50%;background:var(--accent);display:grid;place-items:center;font:800 13px/1 'Inter';color:#12141a}
.hdr-title{font:800 15px/1 var(--f-display);letter-spacing:-.015em}
.hdr-sub{font-size:10px;color:var(--text3);margin-top:3px}
.tabs{display:flex;gap:2px;margin-left:20px;background:var(--surface);border-radius:8px;padding:3px}
.tab{background:none;border:none;color:var(--text3);font:600 12px/1 'Inter';padding:7px 15px;border-radius:6px;cursor:pointer}
.tab:hover{color:var(--text)}
.tab.on{color:var(--text);background:var(--bg3);box-shadow:var(--shadow)}
.hdr-right{margin-left:auto;display:flex;gap:8px;align-items:center}
.lnk{background:var(--surface);border:1px solid var(--border);color:var(--text2);font:500 11px/1 'Inter';padding:6px 12px;border-radius:6px;cursor:pointer;text-decoration:none;white-space:nowrap}
.lnk:hover{background:var(--surface2);color:var(--text)}
.lnk.acc{background:var(--accent-dim);border-color:var(--accent-glow);color:var(--accent)}
select.lnk{background:var(--bg3);color:var(--text);appearance:none;
  background-image:linear-gradient(45deg,transparent 50%,var(--text3) 50%),linear-gradient(135deg,var(--text3) 50%,transparent 50%);
  background-position:calc(100% - 15px) 52%,calc(100% - 10px) 52%;background-size:5px 5px,5px 5px;background-repeat:no-repeat;padding-right:30px!important}
select.lnk:focus{border-color:var(--accent);outline:none}
select option,.sel option{background:var(--bg2);color:var(--text)}
.wrap{flex:1;display:flex;overflow:hidden}
.side{width:250px;background:var(--bg2);border-right:1px solid var(--border);display:flex;flex-direction:column}
.side.hide{display:none}
.plist{flex:1;overflow-y:auto;padding:6px}
.pitem{padding:9px 11px;border-radius:6px;cursor:pointer;display:flex;justify-content:space-between;gap:8px}
.pitem:hover{background:var(--surface)}
.pitem.on{background:var(--accent-dim);box-shadow:inset 2px 0 0 var(--accent)}
.pitem-nm{font:600 12.5px/1.2 var(--f-body);letter-spacing:-.005em}
.pitem-meta{font:500 10px/1 var(--f-data);color:var(--text3);font-variant-numeric:tabular-nums}
.main{flex:1;overflow-y:auto;padding:13px 18px}
.empty{height:100%;display:grid;place-items:center;color:var(--text3);font:500 13px/1 'Inter'}
.tcard{background:var(--bg2);border:1px solid var(--border);border-left:4px solid var(--accent);border-radius:10px;padding:12px 16px;margin-bottom:10px;display:flex;gap:22px;flex-wrap:wrap;box-shadow:var(--shadow)}
.tname{font:800 27px/1.08 var(--f-display);letter-spacing:-.025em}
.tmeta{font:500 11px/1.5 'Inter';color:var(--text2);margin-top:5px}
.kpis{display:flex;gap:7px;flex-wrap:wrap;margin-bottom:10px}
.kpi{background:var(--bg2);border:1px solid var(--border);border-radius:9px;padding:10px 13px;min-width:120px;flex:1;box-shadow:var(--shadow)}
.kpi-l{font:700 9px/1 var(--f-body);letter-spacing:.13em;text-transform:uppercase;color:var(--text3)}
.kpi-v{font:700 23px/1 var(--f-data);letter-spacing:-.03em;margin:8px 0 6px;font-variant-numeric:tabular-nums}
.kpi-s{font:500 9px/1.3 'Inter';color:var(--text3)}
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(400px,1fr));gap:12px}
.sect{background:var(--bg2);border:1px solid var(--border);border-radius:10px;padding:13px 15px;box-shadow:var(--shadow)}
.sect-h{font:700 10px/1 var(--f-body);letter-spacing:.14em;text-transform:uppercase;color:var(--text3);margin-bottom:11px;display:flex;justify-content:space-between}
.row{display:grid;grid-template-columns:170px 66px 1fr 30px;align-items:center;gap:9px;padding:4px 0}
.row-lbl{font:500 11.5px/1.3 var(--f-body);color:var(--text2);cursor:help;border-bottom:1px dotted var(--border2);justify-self:start}
.row-val{font:500 11px/1 var(--f-data);text-align:right;font-variant-numeric:tabular-nums;letter-spacing:-.02em}
.bar{height:9px;background:var(--surface2);border-radius:5px;overflow:hidden}
.bar-f{height:100%;border-radius:5px}
.row-pct{font:700 11px/1 var(--f-data);text-align:right;font-variant-numeric:tabular-nums}
table{width:100%;border-collapse:collapse;font:500 11px/1.4 'Inter'}
th{text-align:left;font:700 9px/1 var(--f-body);letter-spacing:.12em;text-transform:uppercase;color:var(--text3);padding:8px 9px;border-bottom:1px solid var(--border);position:sticky;top:0;background:var(--bg2);cursor:pointer;white-space:nowrap}
th:hover{color:var(--text)}
td{padding:7px 9px;border-bottom:1px solid var(--border)}
tr:hover td{background:var(--surface)}
.num{text-align:right;font-family:var(--f-data);font-weight:500;font-variant-numeric:tabular-nums;letter-spacing:-.02em}
.legend{display:flex;gap:12px;margin-top:12px;padding-top:11px;border-top:1px solid var(--border);flex-wrap:wrap}
.lg{display:flex;align-items:center;gap:5px;font:500 10px/1 'Inter';color:var(--text3)}
.dot{width:8px;height:8px;border-radius:50%}
.foot{margin-top:12px;font:500 10px/1.6 'Inter';color:var(--text3)}
.spin{width:20px;height:20px;border:2px solid var(--border);border-top-color:var(--accent);border-radius:50%;animation:sp .7s linear infinite;margin:40px auto}
@keyframes sp{to{transform:rotate(360deg)}}
.tip{position:fixed;pointer-events:none;background:var(--bg3);border:1px solid var(--border2);border-radius:6px;padding:6px 9px;font:600 11px/1.3 'Inter';box-shadow:0 4px 14px rgba(0,0,0,.35);z-index:50;display:none;color:var(--text)}
.pitch-box{height:calc(100vh - 416px);min-height:230px;max-height:640px}
.viz-eyebrow{font:700 8.5px/1 var(--f-body);letter-spacing:.18em;text-transform:uppercase;color:var(--text3);margin-bottom:6px}
.viz-title{font:700 16px/1.1 var(--f-display);letter-spacing:-.02em;color:var(--text);margin-bottom:6px}
.viz-sub{font:500 10px/1.45 var(--f-body);color:var(--text3);margin:0 0 7px;max-width:82ch}
.viz-leg{display:flex;gap:14px;flex-wrap:wrap;margin-top:9px;padding-top:9px;border-top:1px solid var(--border);font:500 10px/1 'Inter';color:var(--text3)}
.viz-leg i{display:inline-block;width:9px;height:9px;border-radius:50%;margin-right:5px;vertical-align:-1px}
.viz-leg b{font-weight:700;color:var(--text2)}
.vz-tog{display:flex;gap:4px;margin:0 0 10px;background:var(--surface);border-radius:7px;padding:3px;flex-wrap:wrap}
.vz-tog.sm{margin:0}
.vz-tog.sm .vzb{font-size:9.5px;padding:5px 9px}
.vz-filters{display:flex;align-items:center;gap:9px;flex-wrap:wrap;margin:0 0 10px}
.vz-flabel{font:700 8.5px/1 var(--f-body);letter-spacing:.16em;text-transform:uppercase;color:var(--text3)}
.vzb{background:none;border:none;color:var(--text3);font:600 10px/1 'Inter';padding:6px 10px;border-radius:5px;cursor:pointer}
.vzb:hover{color:var(--text)}
.vzb.on{color:var(--text);background:var(--bg3);box-shadow:var(--shadow)}
.split2{display:grid;grid-template-columns:1.05fr .95fr;gap:12px;align-items:start}
@media(max-width:1150px){.split2{grid-template-columns:1fr}}
.wl{display:inline-block;width:17px;height:17px;border-radius:4px;font:700 9px/17px 'Inter';text-align:center;color:#0d0f14}
</style>
</head>
<body>
<div class="hdr">
  <div class="hdr-logo">T</div>
  <div><div class="hdr-title">Team Profiles</div><div class="hdr-sub" id="hdrSub">loading&hellip;</div></div>
  <div class="tabs" id="tabs"></div>
  <div class="hdr-right">
    <button class="lnk acc" onclick="exportPNG()">&#11015; PNG</button>
    <button class="lnk acc" onclick="exportPDF()">&#11015; PDF</button>
    <a class="lnk" href="players.html">Players &rarr;</a>
    <a class="lnk" href="index.html">&larr; Match Dashboard</a>
    <button class="lnk" onclick="document.documentElement.classList.toggle('dark')">Theme</button>
  </div>
</div>
<div class="wrap">
  <div class="side" id="side"><div class="plist" id="tlist"></div></div>
  <div class="main" id="main"><div class="empty">Loading&hellip;</div></div>
</div>
<div class="tip" id="tip"></div>
<script>
const SB='https://xrsilhiffjoulyoqhdmp.supabase.co';
const AK='eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Inhyc2lsaGlmZmpvdWx5b3FoZG1wIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODQ2Nzc5NDAsImV4cCI6MjEwMDI1Mzk0MH0.3_ccOJi0SBKOwHGxhJL3fsWCSSLoxZumzt-KH4wO8OU';
const HD={'apikey':AK,'Authorization':'Bearer '+AK};
const TABS=['Profile','Maps','Rankings','League Map','Matches','Squad'];
let TEAMS=[],TDEFS=[],SEL=null,TAB='Profile',PCT={},PLAYERS=[];
let LM={x:'ppda',y:'field_tilt'};
let MP={kind:'passes',third:'',lane:'',outcome:'ok'};
let RKT={metric:'ppda'};
let ZONES=null,CZONES=null,TSHOTS=null,ZTEAM=null,BUILD=null,LANES=null;

async function sbAll(t,p){p=p||{};const PG=1000;let all=[],off=0;
  while(true){const u=new URL(SB+'/rest/v1/'+t);
    Object.keys(p).forEach(function(k){u.searchParams.set(k,p[k])});
    const r=await fetch(u,{headers:Object.assign({},HD,{'Range':off+'-'+(off+PG-1),'Range-Unit':'items'})});
    if(!r.ok)throw new Error(t+' '+r.status);const d=await r.json();
    if(!Array.isArray(d)||!d.length)break;all=all.concat(d);if(d.length<PG)break;off+=PG;}
  return all;}
function esc(s){return String(s==null?'':s).replace(/[&<>"']/g,function(c){
  return({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'})[c]})}
function tier(p){if(p==null)return{c:'var(--text3)'};if(p>=80)return{c:'var(--elite)'};
  if(p>=60)return{c:'var(--above)'};if(p>=40)return{c:'var(--avg)'};if(p>=20)return{c:'var(--below)'};return{c:'var(--poor)'}}
function fmt(v,u){if(v==null)return'\u2014';return (+v).toLocaleString(undefined,{maximumFractionDigits:2})+(u==='%'?'%':(u==='m'?' m':''))}
function tdefOf(k){for(var i=0;i<TDEFS.length;i++)if(TDEFS[i].key===k)return TDEFS[i];return null}
function teamOf(n){for(var i=0;i<TEAMS.length;i++)if(TEAMS[i].team===n)return TEAMS[i];return null}

async function init(){
  try{
    const r=await Promise.all([
      sbAll('mv_team_all',{select:'*',order:'team.asc'}),
      sbAll('team_metric_defs',{select:'*',order:'grp_order.asc,sort_order.asc'}),
      sbAll('mv_team_percentiles',{select:'team,metric,value,pct'}),
      sbAll('mv_team_buildup',{select:'*'}),
      sbAll('mv_team_lanes',{select:'*'})
    ]);
    TEAMS=r[0];TDEFS=r[1];
    PCT={};r[2].forEach(function(x){if(!PCT[x.team])PCT[x.team]={};PCT[x.team][x.metric]=x});
    BUILD={};(r[3]||[]).forEach(function(b){BUILD[b.team]=b});
    LANES={};(r[4]||[]).forEach(function(l){if(!LANES[l.team])LANES[l.team]={};LANES[l.team][l.lane]=l});
    document.getElementById('hdrSub').textContent='MLS 2026 \u00B7 '+TEAMS.length+' teams \u00B7 ranked across the league';
    renderTabs();renderList();
    SEL=teamOf('Los Angeles FC')?'Los Angeles FC':TEAMS[0].team;
    pick(SEL);
  }catch(e){document.getElementById('main').innerHTML='<div class="empty">Failed to load: '+esc(e.message)+'</div>'}
}
function renderTabs(){document.getElementById('tabs').innerHTML=TABS.map(function(t){
  return '<button class="tab'+(TAB===t?' on':'')+'" onclick="setTab(\''+t+'\')">'+t+'</button>'}).join('')}
function setTab(t){TAB=t;renderTabs();
  document.getElementById('side').classList.toggle('hide',t==='League Map'||t==='Rankings');
  draw();}
function renderList(){
  document.getElementById('tlist').innerHTML=TEAMS.slice().sort(function(a,b){
    return b.field_tilt-a.field_tilt}).map(function(t){
    return '<div class="pitem'+(SEL===t.team?' on':'')+'" onclick="pick(\''+esc(t.team).replace(/'/g,"\\'")+'\')">'+
      '<span class="pitem-nm">'+esc(t.team)+'</span>'+
      '<span class="pitem-meta">'+t.matches+'</span></div>'}).join('');
}
function pick(t){SEL=t;renderList();draw()}

async function draw(){
  const main=document.getElementById('main');
  if(TAB==='League Map')return renderLeagueMap();
  if(!SEL)return;
  const t=teamOf(SEL);if(!t)return;
  if(TAB==='Rankings')return renderRankings();
  if(TAB==='Profile')return renderProfile(t);
  main.innerHTML='<div class="spin"></div>';
  if(TAB==='Maps')return renderMaps(t);
  if(TAB==='Matches')return renderMatches(t);
  if(TAB==='Squad')return renderSquad(t);
}
function teamHead(t){
  const p=PCT[t.team]||{};
  const gd=(t.goals_pg-t.goals_against_pg);
  return '<div class="tcard"><div style="flex:1;min-width:230px">'+
    '<div class="tname">'+esc(t.team)+'</div>'+
    '<div class="tmeta">MLS 2026 \u00B7 '+t.matches+' matches \u00B7 '+(+t.goals_pg).toFixed(2)+' scored / '+
    (+t.goals_against_pg).toFixed(2)+' conceded per game \u00B7 GD '+(gd>=0?'+':'')+gd.toFixed(2)+'</div></div></div>'+
    '<div class="kpis">'+
    kpi('Possession',(+t.possession_pct).toFixed(1)+'%',p.possession_pct)+
    kpi('Field tilt',(+t.field_tilt).toFixed(1)+'%',p.field_tilt)+
    kpi('PPDA',(+t.ppda).toFixed(2),p.ppda,'lower = presses harder')+
    kpi('Line height',(+t.def_height).toFixed(1),p.def_height)+
    kpi('Directness',(+t.directness).toFixed(2)+' m',p.directness)+
    kpi('Shots',(+t.shots_pg).toFixed(1),p.shots_pg)+
    '</div>';
}
function kpi(l,v,p,sub){
  const c=p?tier(+p.pct).c:'var(--text)';
  return '<div class="kpi"><div class="kpi-l">'+l+'</div><div class="kpi-v" style="color:'+c+'">'+v+'</div>'+
    '<div class="kpi-s">'+(p?('league pct '+p.pct):(sub||''))+'</div></div>';
}
function renderProfile(t){
  const p=PCT[t.team]||{};
  const groups=[];TDEFS.forEach(function(d){if(groups.indexOf(d.grp)<0)groups.push(d.grp)});
  let h=teamHead(t)+'<div class="grid">';
  groups.forEach(function(g){
    const ms=TDEFS.filter(function(d){return d.grp===g});
    h+='<div class="sect"><div class="sect-h"><span>'+esc(g)+'</span></div>';
    ms.forEach(function(d){
      const r=p[d.key],pc=r?+r.pct:null,tc=tier(pc);
      h+='<div class="row"><div class="row-lbl" title="'+esc(d.definition||'')+'">'+esc(d.label)+'</div>'+
         '<div class="row-val">'+(r?fmt(r.value,d.unit):'\u2014')+'</div>'+
         '<div class="bar"><div class="bar-f" style="width:'+(pc==null?0:pc)+'%;background:'+tc.c+'"></div></div>'+
         '<div class="row-pct" style="color:'+tc.c+'">'+(pc==null?'':pc)+'</div></div>';
    });
    h+='</div>';
  });
  h+='</div>';
  h+='<div class="split2" style="margin-top:12px">'+attackProfile(t)+laneViz(t)+'</div>';
  h+=legendHtml()+'<div class="foot">Percentiles are across all 30 MLS teams this season. '+
     'PPDA and the conceded metrics are inverted so a high percentile always means better. '+'A possession ends when the opposition touch the ball or play stops for more than eight seconds.</div>';
  document.getElementById('main').innerHTML=h;
}
function metricOpts(sel){let o='',g='';
  TDEFS.forEach(function(d){if(d.grp!==g){if(g)o+='</optgroup>';o+='<optgroup label="'+esc(d.grp)+'">';g=d.grp}
    o+='<option value="'+d.key+'"'+(sel===d.key?' selected':'')+'>'+esc(d.label)+'</option>'});
  return o+'</optgroup>'}
function renderLeagueMap(){
  const dx=tdefOf(LM.x)||{},dy=tdefOf(LM.y)||{};
  const pts=TEAMS.map(function(t){return{team:t.team,x:+t[LM.x],y:+t[LM.y]}}).filter(function(p){return !isNaN(p.x)&&!isNaN(p.y)});
  const W=1080,H=520,MT=22,MR=34,MB=54,ML=82;
  const xs=pts.map(function(p){return p.x}),ys=pts.map(function(p){return p.y});
  const x0=Math.min.apply(null,xs),x1=Math.max.apply(null,xs),y0=Math.min.apply(null,ys),y1=Math.max.apply(null,ys);
  const px=(x1-x0)*.1||1,py=(y1-y0)*.1||1;
  const xmin=x0-px,xmax=x1+px,ymin=y0-py,ymax=y1+py;
  function SX(v){return ML+((v-xmin)/(xmax-xmin))*(W-ML-MR)}
  function SY(v){return H-MB-((v-ymin)/(ymax-ymin))*(H-MT-MB)}
  function med(a){const s=a.slice().sort(function(m,n){return m-n});return s[Math.floor(s.length/2)]}
  const mx=med(xs),my=med(ys);
  let s='<svg viewBox="0 0 '+W+' '+H+'" preserveAspectRatio="xMidYMid meet" style="width:100%;height:auto;max-height:calc(100vh - 230px);display:block">';
  // gridlines + tick values
  [0,0.25,0.5,0.75,1].forEach(function(f){
    const vx=xmin+f*(xmax-xmin), vy=ymin+f*(ymax-ymin);
    s+='<line x1="'+SX(vx)+'" y1="'+MT+'" x2="'+SX(vx)+'" y2="'+(H-MB)+'" stroke="var(--border)" stroke-opacity="0.55"/>';
    s+='<line x1="'+ML+'" y1="'+SY(vy)+'" x2="'+(W-MR)+'" y2="'+SY(vy)+'" stroke="var(--border)" stroke-opacity="0.55"/>';
    s+='<text x="'+SX(vx)+'" y="'+(H-MB+20)+'" fill="var(--text3)" font-size="11" text-anchor="middle" font-family="JetBrains Mono,monospace">'+(+vx).toFixed(1)+'</text>';
    s+='<text x="'+(ML-10)+'" y="'+(SY(vy)+4)+'" fill="var(--text3)" font-size="11" text-anchor="end" font-family="JetBrains Mono,monospace">'+(+vy).toFixed(1)+'</text>';
  });
  s+='<line x1="'+ML+'" y1="'+(H-MB)+'" x2="'+(W-MR)+'" y2="'+(H-MB)+'" stroke="var(--border2)"/>';
  s+='<line x1="'+ML+'" y1="'+MT+'" x2="'+ML+'" y2="'+(H-MB)+'" stroke="var(--border2)"/>';
  s+='<line x1="'+SX(mx)+'" y1="'+MT+'" x2="'+SX(mx)+'" y2="'+(H-MB)+'" stroke="var(--accent)" stroke-opacity="0.45" stroke-dasharray="5 4"/>';
  s+='<line x1="'+ML+'" y1="'+SY(my)+'" x2="'+(W-MR)+'" y2="'+SY(my)+'" stroke="var(--accent)" stroke-opacity="0.45" stroke-dasharray="5 4"/>';
  s+='<text x="'+(SX(mx)+5)+'" y="'+(MT+11)+'" fill="var(--accent)" font-size="9" font-weight="700" font-family="Inter" opacity="0.8">league median</text>';
  pts.forEach(function(p){
    const on=p.team===SEL,cx=SX(p.x),cy=SY(p.y),right=cx<W-170;
    s+='<circle cx="'+cx+'" cy="'+cy+'" r="'+(on?8:5.5)+'" fill="'+(on?'var(--accent)':'var(--above)')+
       '" fill-opacity="'+(on?1:.55)+'"/>';

/* Zone test runs on where the action STARTS. Attack is left to right, so with the
   pitch drawn from above the top strip is the attacking team's left. */
function okFilter(a){
  if(MP.outcome==='ok')return a.ok===true;
  if(MP.outcome==='fail')return a.ok===false;
  return true;
}
function outcomeNote(){
  if(MP.outcome==='ok')return'';
  if(MP.outcome==='fail')return' Showing only actions that failed.';
  return' Completed in green, failed in red.';
}
function inZone(x,y){
  if(MP.third==='def'&&!(x<33.3))return false;
  if(MP.third==='mid'&&!(x>=33.3&&x<66.7))return false;
  if(MP.third==='att'&&!(x>=66.7))return false;
  if(MP.lane==='L'&&!(y<33.3))return false;
  if(MP.lane==='C'&&!(y>=33.3&&y<66.7))return false;
  if(MP.lane==='R'&&!(y>=66.7))return false;
  return true;
}
function zoneShade(){
  if(!MP.third&&!MP.lane)return'';
  const x0=MP.third==='def'?0:(MP.third==='mid'?33.3:(MP.third==='att'?66.7:0));
  const x1=MP.third==='def'?33.3:(MP.third==='mid'?66.7:(MP.third==='att'?100:100));
  const y0=MP.lane==='L'?0:(MP.lane==='C'?33.3:(MP.lane==='R'?66.7:0));
  const y1=MP.lane==='L'?33.3:(MP.lane==='C'?66.7:(MP.lane==='R'?100:100));
  return '<rect x="'+PX(x0)+'" y="'+PY(y0)+'" width="'+PX(x1-x0)+'" height="'+PY(y1-y0)+
         '" fill="var(--accent)" fill-opacity="0.055"/>';
}
function zoneNote(){
  if(!MP.third&&!MP.lane)return'';
  const t={def:'defensive third',mid:'middle third',att:'final third'}[MP.third]||'';
  const l={L:'left',C:'central',R:'right'}[MP.lane]||'';
  return ' Filtered to '+[l,t].filter(Boolean).join(' ')+(l&&!t?' channel':'')+'.';
}
async function loadZones(team){
  if(ZTEAM===team&&ZONES)return;
  const r=await Promise.all([
    sbAll('v_team_actions',{team:'eq.'+team,select:'type,x,y,end_x,end_y,ok,is_shot,prog,into_box'}),
    sbAll('v_team_carries',{team:'eq.'+team,select:'start_x,start_y,end_x,end_y,is_progressive,into_box'}),
    sbAll('v_team_shots',{select:'team,x,y,xg,is_goal,game_id'})
  ]);
  ZONES=r[0];CZONES=r[1];TSHOTS=r[2];ZTEAM=team;
}
function tline(a,c,w,op){
  return '<line x1="'+PX(a.x)+'" y1="'+PY(a.y)+'" x2="'+PX(a.end_x)+'" y2="'+PY(a.end_y)+
    '" stroke="'+c+'" stroke-width="'+w+'" stroke-opacity="'+op+'" stroke-linecap="round"/>';
}
async function renderMaps(t){
  const main=document.getElementById('main');
  main.innerHTML=teamHead(t)+'<div class="sect"><div class="spin"></div>'+
    '<div style="text-align:center;color:var(--text3);font:500 11px/1 Inter">Loading season actions\u2026</div></div>';
  try{
    await loadZones(t.team);
    const m=MAPS.filter(function(x){return x.k===MP.kind})[0]||MAPS[0];
    const G='var(--elite)',R='var(--poor)',AC='var(--accent)',B='#60a5fa',N='var(--text3)',Y='var(--avg)';
    let inner=zoneShade(),leg='';

    if(m.k==='passes'){
      const ps=ZONES.filter(function(a){return a.type==='Pass'&&okFilter(a)&&a.end_x!=null&&inZone(a.x,a.y)});

    else if(m.k==='box'){

      ps.forEach(function(a){inner+=tline(a,a.ok?AC:R,0.28,a.ok?0.55:0.4)+

    }
    else if(m.k==='carries'){
      let pr=0,ot=0;

      });
      leg='<span><i style="background:'+G+'"></i>Progressive <b>'+pr.toLocaleString()+'</b></span>'+
          '<span><i style="background:'+N+'"></i>Other carries <b>'+ot.toLocaleString()+'</b></span>';
    }
    else if(m.k==='heat'){
      const rows=ZONES.filter(function(a){return inZone(a.x,a.y)});
      inner+=heatLayer(rows);
      leg='<span>Smoothed density of <b>'+rows.length.toLocaleString()+'</b> actions \u00B7 brighter is busier</span>';
    }
    else if(m.k==='touches'){
      ZONES.filter(function(a){return inZone(a.x,a.y)}).forEach(function(a){
        inner+='<circle cx="'+PX(a.x)+'" cy="'+PY(a.y)+'" r="0.42" fill="'+AC+'" fill-opacity="0.16"/>';
      });
      leg='<span><i style="background:'+AC+'"></i>On-ball actions <b>'+ZONES.filter(function(a){return inZone(a.x,a.y)}).length.toLocaleString()+'</b></span>';
    }
    else if(m.k==='def'){
      const col={Tackle:R,Interception:B,BallRecovery:G,Clearance:'#a78bfa',BlockedPass:Y,Challenge:'#f472b6'};
      const ds=ZONES.filter(function(a){return col[a.type]&&inZone(a.x,a.y)});
      const cnt={};
      ds.forEach(function(a){cnt[a.type]=(cnt[a.type]||0)+1;

      leg=Object.keys(cnt).map(function(k){

    }
    else {
      const forTeam=(m.k==='shots');
      const gids={};TSHOTS.forEach(function(x){if(x.team===t.team)gids[x.game_id]=1});
      const sh=TSHOTS.filter(function(x){return (forTeam?x.team===t.team:(gids[x.game_id]&&x.team!==t.team))&&inZone(x.x,x.y)});
      let g=0,sx=0;
      sh.forEach(function(a){

               '" fill-opacity="'+(a.is_goal?0.95:0.4)+'" stroke="'+c+'" stroke-width="0.18" stroke-opacity="0.8"/>';
      });
      leg='<span><i style="background:'+AC+'"></i>Goals <b>'+g+'</b></span>'+
          '<span><i style="background:'+(forTeam?G:R)+'"></i>Shots <b>'+sh.length+'</b></span>'+
          '<span>xG <b>'+sx.toFixed(1)+'</b></span>';
    }
    main.innerHTML=teamHead(t)+pitchWrap(m.l,m.d+' Attack is left to right, across all '+t.matches+' matches.'+zoneNote()+outcomeNote(),
      inner,leg,mapCtrl());
  }catch(e){main.innerHTML=teamHead(t)+'<div class="empty">Error: '+esc(e.message)+'</div>'}

function heatLayer(rows){
  const GW=42,GH=28,cw=105/GW,ch=68/GH;
  const g=[];for(let j=0;j<GH;j++)g.push(new Float32Array(GW));
  rows.forEach(function(a){
    const i=Math.min(GW-1,Math.max(0,Math.floor(a.x/100*GW)));
    const j=Math.min(GH-1,Math.max(0,Math.floor(a.y/100*GH)));
    g[j][i]++;
  });
  let mx=0;for(let j=0;j<GH;j++)for(let i=0;i<GW;i++)if(g[j][i]>mx)mx=g[j][i];
  if(!mx)mx=1;
  let s2='<defs><filter id="hblur" x="-12%" y="-12%" width="124%" height="124%">'+
         '<feGaussianBlur stdDeviation="2.1"/></filter></defs><g filter="url(#hblur)">';
  for(let j=0;j<GH;j++)for(let i=0;i<GW;i++){
    const v=g[j][i]/mx; if(v<0.04)continue;
    // cool -> warm ramp reads as intensity without a legend
    const t=Math.pow(v,0.62);
    const r=Math.round(40+215*Math.min(1,t*1.35));
    const gg=Math.round(90+150*Math.min(1,Math.max(0,t*1.5-0.25)));
    const b=Math.round(190-150*t);
    s2+='<rect x="'+(i*cw)+'" y="'+(j*ch)+'" width="'+(cw+0.35)+'" height="'+(ch+0.35)+
        '" fill="rgb('+r+','+gg+','+b+')" fill-opacity="'+(0.10+0.72*t).toFixed(3)+'"/>';
  }
  return s2+'</g>';
}

  {k:'direct_attack_pct',l:'Direct attacks',unit:'%',hi:true,d:'Possessions starting in their own half that reach a shot inside 15 seconds.'},
  {k:'pct_ending_in_shot',l:'Possessions ending in a shot',unit:'%',hi:true,d:'How often keeping the ball actually produces an attempt.'},
  {k:'ground_gained',l:'Ground gained per possession',hi:true,d:'How far up the pitch a typical possession travels.'},
  {k:'passes_before_shot',l:'Passes before a shot',hi:true,d:'Length of the possessions that end in an attempt.'},

];
function buildRank(metric,team){
  const vals=Object.keys(BUILD).map(function(t){return +BUILD[t][metric]}).filter(function(v){return !isNaN(v)});
  if(!vals.length)return null;
  const v=+BUILD[team][metric];if(isNaN(v))return null;
  const below=vals.filter(function(x){return x<v}).length;
  return Math.round(100*below/Math.max(1,vals.length-1));
}
function attackProfile(t){
  const b=BUILD&&BUILD[t.team];if(!b)return'';
  let h='<div class="sect"><div class="sect-h"><span>How they attack</span></div>';
  BUILD_DEFS.forEach(function(d){
    const v=b[d.k];const pc=buildRank(d.k,t.team);const c=tier(pc);
    h+='<div class="row"><div class="row-lbl" title="'+esc(d.d)+'">'+esc(d.l)+'</div>'+
       '<div class="row-val">'+(v==null?'\u2014':(+v).toFixed(d.unit==='%'?1:2)+(d.unit==='%'?'%':''))+'</div>'+
       '<div class="bar"><div class="bar-f" style="width:'+(pc==null?0:pc)+'%;background:'+c.c+'"></div></div>'+
       '<div class="row-pct" style="color:'+c.c+'">'+(pc==null?'':pc)+'</div></div>';
  });
  return h+'</div>';
}
function laneViz(t){
  const L=LANES&&LANES[t.team];if(!L)return'';
  const get=function(k){return L[k]?+L[k].pct_of_final_third:0};
  const l=get('L'),c=get('C'),r=get('R');
  const bands=[{k:'L',lbl:'Left',v:l,y0:0,y1:33.3},{k:'C',lbl:'Centre',v:c,y0:33.3,y1:66.7},{k:'R',lbl:'Right',v:r,y0:66.7,y1:100}];
  const mx=Math.max(l,c,r)||1;
  let inner='';
  bands.forEach(function(b){
    const t2=b.v/mx;
    inner+='<rect x="'+PX(50)+'" y="'+PY(b.y0)+'" width="'+PX(50)+'" height="'+PY(b.y1-b.y0)+
           '" fill="var(--accent)" fill-opacity="'+(0.06+0.42*t2).toFixed(3)+'"/>';
    inner+='<text x="'+PX(76)+'" y="'+(PY((b.y0+b.y1)/2)+1.2)+'" fill="var(--text)" font-size="4.6" font-weight="800" '+
           'text-anchor="middle" font-family="JetBrains Mono,monospace">'+b.v.toFixed(1)+'%</text>';
    inner+='<text x="'+PX(76)+'" y="'+(PY((b.y0+b.y1)/2)+6.2)+'" fill="var(--text3)" font-size="2.6" font-weight="700" '+
           'text-anchor="middle" letter-spacing="0.4" font-family="Inter">'+b.lbl.toUpperCase()+'</text>';
  });
  const domi=l>c&&l>r?'down the left':(r>c&&r>l?'down the right':'through the middle');
  return pitchWrap('Which side they attack',
    'Share of final-third involvement by channel. This team works '+domi+'. Attack is left to right, so the top band is their left.',
    inner,
    '<span><i style="background:var(--accent)"></i>Darker band = more of their final-third play</span>');
}
/* ---------- RANKINGS ---------- */
function renderRankings(){
  const d=tdefOf(RKT.metric)||{};
  const rows=TEAMS.map(function(t){
    const p=(PCT[t.team]||{})[RKT.metric];
    return{team:t.team,value:+t[RKT.metric],pct:p?+p.pct:null};
  }).filter(function(r){return !isNaN(r.value)});
  rows.sort(function(a,b){return (b.pct==null?-1:b.pct)-(a.pct==null?-1:a.pct)});
  const mx=Math.max.apply(null,rows.map(function(r){return Math.abs(r.value)}))||1;
  const W=1080,BH=26,MT=26,ML=190,H=MT+rows.length*BH+16;
  let sv='<svg viewBox="0 0 '+W+' '+H+'" preserveAspectRatio="xMidYMid meet" style="width:100%;height:auto;display:block">';
  rows.forEach(function(r,i){
    const y=MT+i*BH,w=Math.max(2,Math.abs(r.value)/mx*(W-ML-90));
    const c=tier(r.pct).c,on=r.team===SEL;
    sv+='<text x="'+(ML-9)+'" y="'+(y+14)+'" fill="'+(on?'var(--accent)':'var(--text2)')+'" font-size="11" font-weight="'+(on?800:600)+
        '" text-anchor="end" font-family="Inter">'+esc(r.team)+'</text>';
    sv+='<rect x="'+ML+'" y="'+(y+4)+'" width="'+w+'" height="14" rx="3" fill="'+c+'" fill-opacity="'+(on?0.98:0.7)+'"/>';
    sv+='<text x="'+(ML+w+8)+'" y="'+(y+15)+'" fill="'+c+'" font-size="10.5" font-weight="700" font-family="Inter">'+
        fmt(r.value,d.unit)+'</text>';
    sv+='<text x="'+(ML-9-0)+'" y="'+(y+14)+'" opacity="0"></text>';
  });
  sv+='</svg>';
  let tb='<div style="max-height:560px;overflow:auto"><table><thead><tr>'+
    '<th style="cursor:default">#</th><th style="cursor:default">Team</th>'+
    '<th class="num" style="cursor:default">'+esc(d.label||'Value')+'</th>'+
    '<th class="num" style="cursor:default">League pct</th></tr></thead><tbody>';
  rows.forEach(function(r,i){
    tb+='<tr'+(r.team===SEL?' style="background:var(--accent-dim)"':'')+'>'+
      '<td class="num" style="color:var(--text3)">'+(i+1)+'</td>'+
      '<td style="font-weight:700;cursor:pointer" onclick="SEL=\''+esc(r.team).replace(/'/g,"\\'")+
      '\';TAB=\'Profile\';renderTabs();renderList();draw()">'+esc(r.team)+'</td>'+
      '<td class="num" style="font-weight:700">'+fmt(r.value,d.unit)+'</td>'+
      '<td class="num" style="color:'+tier(r.pct).c+';font-weight:700">'+(r.pct==null?'\u2014':r.pct)+'</td></tr>';
  });
  tb+='</tbody></table></div>';
  document.getElementById('main').innerHTML=
    '<div class="sect" style="margin-bottom:12px"><div style="display:flex;gap:14px;flex-wrap:wrap;align-items:flex-end">'+
    '<div style="display:flex;flex-direction:column;gap:5px;min-width:250px"><span class="kpi-l">Rank teams by</span>'+
      '<select class="lnk" style="padding:8px 10px;width:100%" onchange="RKT.metric=this.value;renderRankings()">'+metricOpts(RKT.metric)+'</select></div>'+
    '<div style="display:flex;flex-direction:column;gap:5px;min-width:220px"><span class="kpi-l">Highlight</span>'+
      '<select class="lnk" style="padding:8px 10px;width:100%" onchange="SEL=this.value;renderList();renderRankings()">'+
      TEAMS.map(function(t){return '<option value="'+esc(t.team)+'"'+(SEL===t.team?' selected':'')+'>'+esc(t.team)+'</option>'}).join('')+
      '</select></div></div>'+
    '<div class="foot" style="margin-top:8px">Sorted best to worst, so inverted metrics like PPDA and goals conceded put the strongest team on top. '+
    (d.definition?esc(d.definition):'')+'</div></div>'+
    '<div class="split2"><div class="sect">'+sv+'</div><div class="sect">'+tb+'</div></div>'+legendHtml();
}

function legendHtml(){return '<div class="legend">'+[['var(--elite)','Elite 80+'],['var(--above)','Above 60+'],
  ['var(--avg)','Average 40+'],['var(--below)','Below 20+'],['var(--poor)','Poor']]
  .map(function(a){return '<div class="lg"><div class="dot" style="background:'+a[0]+'"></div>'+a[1]+'</div>'}).join('')+'</div>'}
async function snap(){const el=document.getElementById('main');
  return await html2canvas(el,{backgroundColor:getComputedStyle(document.body).backgroundColor,scale:2,
    windowWidth:el.scrollWidth,height:el.scrollHeight,windowHeight:el.scrollHeight})}
async function exportPNG(){try{const c=await snap();const a=document.createElement('a');
  a.download=(SEL||'team').replace(/[^\w]+/g,'_')+'.png';a.href=c.toDataURL('image/png');a.click()}catch(e){alert(e.message)}}
async function exportPDF(){try{const c=await snap();const jsPDF=window.jspdf.jsPDF;
  const pdf=new jsPDF({orientation:c.width>=c.height?'l':'p',unit:'pt',format:'a4'});
  const pw=pdf.internal.pageSize.getWidth(),ph=pdf.internal.pageSize.getHeight();
  const r=Math.min(pw/c.width,ph/c.height);
  pdf.addImage(c.toDataURL('image/png'),'PNG',(pw-c.width*r)/2,20,c.width*r,c.height*r);
  pdf.save((SEL||'team').replace(/[^\w]+/g,'_')+'.pdf')}catch(e){alert(e.message)}}
init();
</script>
</body>
