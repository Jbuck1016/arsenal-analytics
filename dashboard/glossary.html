<!DOCTYPE html>
<html lang="en" class="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Metric reference · MLS 2026</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Archivo:wght@600;700;800&family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
:root{
  --f-mono:'JetBrains Mono','SFMono-Regular',Consolas,monospace;
  --f-disp:'Archivo','Inter',system-ui,sans-serif;
  --f-body:'Inter',system-ui,sans-serif;
  --bg:#080a0e;--panel:#0e1116;--panel2:#141821;
  --line:#1c222c;--line2:#2b333f;
  --text:#e8eef6;--dim:#8794a6;--dim2:#5b6675;
  --amber:#e2b877;--amber-dim:rgba(226,184,119,.10);--amber-line:rgba(226,184,119,.32);
  --green:#3ddc97;--red:#ff5f56;--blue:#5aa9ff;
}
*{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%}
body{background:var(--bg);color:var(--text);font-family:var(--f-body);display:flex;flex-direction:column;overflow:hidden}
a{color:inherit;text-decoration:none}

.hdr{height:52px;border-bottom:1px solid var(--line);background:var(--panel);
  display:flex;align-items:center;gap:14px;padding:0 18px;flex-shrink:0}
.hdr-mark{font:700 12px/1 var(--f-mono);color:var(--amber)}
.hdr-t{font:800 15px/1 var(--f-disp);letter-spacing:-.02em}
.hdr-s{font:500 10px/1 var(--f-mono);color:var(--dim2);margin-top:4px}
.nav{display:flex;gap:2px;margin-left:18px}
.nav a{font:600 11.5px/1 var(--f-mono);color:var(--dim);padding:7px 11px;border-radius:2px}
.nav a:hover{color:var(--text);background:var(--panel2)}
.nav a.on{color:var(--amber);background:var(--amber-dim)}
.hdr-r{margin-left:auto}

.wrap{flex:1;display:flex;overflow:hidden}
.side{width:290px;border-right:1px solid var(--line);background:var(--panel);
  display:flex;flex-direction:column;flex-shrink:0}
.side-top{padding:11px;border-bottom:1px solid var(--line)}
.q{width:100%;background:var(--bg);border:1px solid var(--line2);color:var(--text);
  font:500 12px/1 var(--f-mono);padding:9px 10px;border-radius:2px;outline:none}
.q:focus{border-color:var(--amber-line)}
.list{flex:1;overflow-y:auto;padding-bottom:20px}
.gh{font:600 9px/1 var(--f-mono);letter-spacing:.18em;text-transform:uppercase;color:var(--dim2);
  padding:12px 13px 7px;border-bottom:1px solid var(--line);background:var(--panel);
  position:sticky;top:0;z-index:2}
.mi{padding:8px 13px;cursor:pointer;border-bottom:1px solid var(--line);display:flex;
  align-items:center;justify-content:space-between;gap:8px}
.mi:hover{background:var(--panel2)}
.mi.on{background:var(--amber-dim);box-shadow:inset 2px 0 0 var(--amber)}
.mi-n{font:600 12px/1.25 var(--f-body)}
.mi-k{font:500 9px/1 var(--f-mono);color:var(--dim2)}

.main{flex:1;overflow-y:auto;padding:20px 24px 60px}
.entry{max-width:900px}
.e-eye{font:600 9px/1 var(--f-mono);letter-spacing:.2em;text-transform:uppercase;color:var(--dim2)}
.e-t{font:800 30px/1.08 var(--f-disp);letter-spacing:-.03em;margin:9px 0 4px}
.e-k{font:500 11px/1 var(--f-mono);color:var(--amber)}
.e-d{font:400 14.5px/1.65 var(--f-body);color:var(--text);margin:16px 0 0;max-width:70ch}

.blk{border:1px solid var(--line);background:var(--panel);border-radius:3px;margin-top:16px}
.blk-h{font:600 9px/1 var(--f-mono);letter-spacing:.2em;text-transform:uppercase;color:var(--dim);
  padding:11px 14px;border-bottom:1px solid var(--line)}
.blk-b{padding:14px}
.calc{font:500 12.5px/1.75 var(--f-mono);color:var(--dim);white-space:pre-wrap}

.scale{display:flex;align-items:flex-end;gap:0;margin:6px 0 4px;height:52px}
.sc-seg{flex:1;background:var(--amber);opacity:.18;border-radius:1px 1px 0 0;margin-right:2px}
.sc-lbls{display:flex;justify-content:space-between;font:500 10px/1 var(--f-mono);color:var(--dim2)}
.stat-row{display:flex;gap:22px;flex-wrap:wrap;margin-bottom:12px}
.st{min-width:88px}
.st-l{font:600 8.5px/1 var(--f-mono);letter-spacing:.14em;text-transform:uppercase;color:var(--dim2)}
.st-v{font:700 17px/1 var(--f-mono);margin-top:6px;letter-spacing:-.02em}

.ex{display:grid;grid-template-columns:1fr 1fr;gap:12px}
@media(max-width:820px){.ex{grid-template-columns:1fr}}
.ex-c{border:1px solid var(--line);border-radius:3px;padding:12px 13px;background:var(--panel2);
  cursor:pointer;transition:border-color .15s}
.ex-c:hover{border-color:var(--amber-line)}
.ex-l{font:600 8.5px/1 var(--f-mono);letter-spacing:.14em;text-transform:uppercase;color:var(--dim2)}
.ex-n{font:700 16px/1.15 var(--f-disp);letter-spacing:-.02em;margin:8px 0 3px}
.ex-m{font:500 10.5px/1.5 var(--f-mono);color:var(--dim)}
.ex-v{font:700 21px/1 var(--f-mono);color:var(--amber);margin-top:9px;letter-spacing:-.03em}
.ex-go{font:500 9.5px/1 var(--f-mono);color:var(--dim2);margin-top:8px}
.ex-c:hover .ex-go{color:var(--amber)}
.read{font:400 13px/1.7 var(--f-body);color:var(--dim);max-width:70ch}
.read b{color:var(--text);font-weight:600}
.warn{border-left:2px solid var(--amber);padding-left:11px;color:var(--dim);
  font:400 12.5px/1.65 var(--f-body);max-width:70ch}
.empty{height:100%;display:grid;place-items:center;color:var(--dim2);font:500 12px/1 var(--f-mono)}
.spin{width:16px;height:16px;border:2px solid var(--line);border-top-color:var(--amber);
  border-radius:50%;animation:sp .7s linear infinite;margin:40px auto}
@keyframes sp{to{transform:rotate(360deg)}}
</style>
</head>
<body>

<div class="hdr">
  <span class="hdr-mark">▐</span>
  <div><div class="hdr-t">Metric reference</div><div class="hdr-s" id="hs">loading…</div></div>
  <div class="nav">
    <a href="index.html">Home</a><a href="match.html">Match</a>
    <a href="players.html">Players</a><a href="teams.html">Teams</a>
    <a class="on" href="glossary.html">Reference</a>
  </div>
</div>

<div class="wrap">
  <div class="side">
    <div class="side-top"><input class="q" id="q" placeholder="filter metrics…" autocomplete="off" spellcheck="false"></div>
    <div class="list" id="list"></div>
  </div>
  <div class="main" id="main"><div class="empty">Choose a metric</div></div>
</div>

<script>
const SB='https://xrsilhiffjoulyoqhdmp.supabase.co';
const AK='eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Inhyc2lsaGlmZmpvdWx5b3FoZG1wIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODQ2Nzc5NDAsImV4cCI6MjEwMDI1Mzk0MH0.3_ccOJi0SBKOwHGxhJL3fsWCSSLoxZumzt-KH4wO8OU';
const HD={'apikey':AK,'Authorization':'Bearer '+AK};
const TEAM_DISPLAY={'Chicago':'Chicago Fire FC','Colorado':'Colorado Rapids','Columbus':'Columbus Crew',
 'Houston':'Houston Dynamo FC','Kansas City':'Sporting Kansas City','Montreal':'CF Montréal',
 'New England':'New England Revolution','New York':'New York Red Bulls','Philadelphia':'Philadelphia Union',
 'Portland':'Portland Timbers','Salt Lake':'Real Salt Lake','San Jose':'San Jose Earthquakes',
 'Seattle':'Seattle Sounders FC','Toronto':'Toronto FC','Vancouver':'Vancouver Whitecaps',
 'L.A. Galaxy':'LA Galaxy'};
function tname(t){return TEAM_DISPLAY[t]||t||''}
function esc(s){return String(s==null?'':s).replace(/[&<>"']/g,function(c){
  return({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'})[c]})}
const POOL_NAME={GK:'goalkeepers',CB:'centre-backs',FB:'full-backs',CM:'central midfielders',
  AM:'attacking midfielders',W:'wide forwards',ST:'strikers'};

let DEFS=[],EX={},DIST={},SEL=null;

async function sbAll(t,p){p=p||{};const PG=1000;let all=[],off=0;
  while(true){const u=new URL(SB+'/rest/v1/'+t);
    Object.keys(p).forEach(function(k){u.searchParams.set(k,p[k])});
    const r=await fetch(u,{headers:Object.assign({},HD,{'Range':off+'-'+(off+PG-1),'Range-Unit':'items'})});
    if(!r.ok)throw new Error(t+' '+r.status);const d=await r.json();
    if(!Array.isArray(d)||!d.length)break;all=all.concat(d);if(d.length<PG)break;off+=PG;}
  return all;}

async function init(){
  try{
    const r=await Promise.all([
      sbAll('metric_defs',{select:'*',order:'grp_order.asc,sort_order.asc'}),
      sbAll('mv_metric_examples',{select:'*'})
    ]);
    DEFS=r[0];
    r[1].forEach(function(e){EX[e.metric]=e});
    document.getElementById('hs').textContent=
      DEFS.length+' metrics · '+[...new Set(DEFS.map(function(d){return d.grp}))].length+
      ' groups · examples drawn from players with 8+ nineties';
    renderList();
    const q=new URLSearchParams(location.search).get('m');
    open(q&&DEFS.some(function(d){return d.key===q})?q:DEFS[0].key);
  }catch(e){document.getElementById('main').innerHTML='<div class="empty">Failed: '+esc(e.message)+'</div>'}
}

function renderList(){
  const f=document.getElementById('q').value.toLowerCase().trim();
  const rows=DEFS.filter(function(d){
    return !f || (d.label+' '+d.key+' '+(d.definition||'')).toLowerCase().indexOf(f)>=0});
  const groups=[];rows.forEach(function(d){if(groups.indexOf(d.grp)<0)groups.push(d.grp)});
  let h='';
  groups.forEach(function(g){
    h+='<div class="gh">'+esc(g)+'</div>';
    rows.filter(function(d){return d.grp===g}).forEach(function(d){
      h+='<div class="mi'+(SEL===d.key?' on':'')+'" onclick="open_(\''+d.key+'\')">'+
         '<span class="mi-n">'+esc(d.label)+'</span><span class="mi-k">'+esc(d.key)+'</span></div>';
    });
  });
  document.getElementById('list').innerHTML=h||'<div class="gh">no match</div>';
}
document.getElementById('q').addEventListener('input',renderList);

function open_(k){open(k)}
async function open(k){
  SEL=k;renderList();
  const d=DEFS.filter(function(x){return x.key===k})[0];if(!d)return;
  const e=EX[k];
  const unit=d.unit==='%'?'%':(d.unit==='m'?' m':(d.unit==='s'?' s':''));
  const fmt=function(v){return v==null?'—':(+v).toLocaleString(undefined,{maximumFractionDigits:3})+unit};

  let h='<div class="entry">'+
    '<div class="e-eye">'+esc(d.grp)+(d.higher_is_better===false?' · lower is better':'')+'</div>'+
    '<div class="e-t">'+esc(d.label)+'</div>'+
    '<div class="e-k">'+esc(d.key)+'</div>'+
    '<div class="e-d">'+esc(d.definition||'')+'</div>';

  h+='<div class="blk"><div class="blk-h">How it is calculated</div><div class="blk-b">'+
     '<div class="calc">'+esc(d.calc||'Counted directly from the event feed, then divided by minutes played over 90.')+'</div></div></div>';

  if(e){
    const lo=+e.min_v, md=+e.med_v, hi=+e.max_v;
    const bars=12;let sb='';
    for(let i=0;i<bars;i++){
      const t=(i+1)/bars;
      sb+='<div class="sc-seg" style="height:'+(14+t*38)+'px;opacity:'+(0.14+t*0.6)+'"></div>';
    }
    h+='<div class="blk"><div class="blk-h">Where it sits in the league</div><div class="blk-b">'+
      '<div class="stat-row">'+
        '<div class="st"><div class="st-l">Lowest</div><div class="st-v">'+fmt(lo)+'</div></div>'+
        '<div class="st"><div class="st-l">Median</div><div class="st-v" style="color:var(--amber)">'+fmt(md)+'</div></div>'+
        '<div class="st"><div class="st-l">Highest</div><div class="st-v">'+fmt(hi)+'</div></div>'+
        '<div class="st"><div class="st-l">Players</div><div class="st-v" style="color:var(--dim)">'+e.n+'</div></div>'+
      '</div>'+
      '<div class="scale">'+sb+'</div>'+
      '<div class="sc-lbls"><span>'+fmt(lo)+'</span><span>'+fmt(hi)+'</span></div>'+
      '</div></div>';

    const best=(d.higher_is_better===false)?
      {n:e.lo_name,t:e.lo_team,p:e.lo_pool,v:e.lo_value,id:e.lo_id}:
      {n:e.hi_name,t:e.hi_team,p:e.hi_pool,v:e.hi_value,id:e.hi_id};
    const worst=(d.higher_is_better===false)?
      {n:e.hi_name,t:e.hi_team,p:e.hi_pool,v:e.hi_value,id:e.hi_id}:
      {n:e.lo_name,t:e.lo_team,p:e.lo_pool,v:e.lo_value,id:e.lo_id};

    h+='<div class="blk"><div class="blk-h">What it looks like in practice</div><div class="blk-b">'+
      '<div class="ex">'+
      exCard('Top of the league',best,unit)+
      exCard('Bottom of the league',worst,unit)+
      '</div>'+
      '<div class="read" style="margin-top:13px">'+readLine(d,best,worst,md,unit)+'</div>'+
      '</div></div>';
  }

  const cav=caveat(k);
  if(cav)h+='<div class="blk"><div class="blk-h">Worth knowing</div><div class="blk-b">'+
    '<div class="warn">'+cav+'</div></div></div>';

  h+='<div class="blk"><div class="blk-h">How to read it</div><div class="blk-b"><div class="read">'+
     'Every value on the player pages is shown two ways: the <b>raw number</b> per 90 minutes, and a '+
     '<b>percentile</b> against the same role. A striker on 0.6 xG per 90 sits in a different distribution '+
     'from a centre-back, so the percentile is what makes them comparable. Percentiles need 6 or more '+
     'nineties; below that the sample is too small and the metric shows as unranked.'+
     '</div></div></div></div>';

  document.getElementById('main').innerHTML=h;
  document.getElementById('main').scrollTop=0;
  history.replaceState(null,'','?m='+encodeURIComponent(k));
}

function exCard(label,p,unit){
  if(!p||!p.n)return '<div class="ex-c"><div class="ex-l">'+label+'</div><div class="ex-m" style="margin-top:9px">no qualifying player</div></div>';
  return '<div class="ex-c" onclick="location.href=\'players.html?player='+encodeURIComponent(p.id)+'\'">'+
    '<div class="ex-l">'+label+'</div>'+
    '<div class="ex-n">'+esc(p.n)+'</div>'+
    '<div class="ex-m">'+esc(tname(p.t))+' · '+esc(POOL_NAME[p.p]||p.p)+'</div>'+
    '<div class="ex-v">'+(+p.v).toLocaleString(undefined,{maximumFractionDigits:3})+unit+'</div>'+
    '<div class="ex-go">open profile →</div></div>';
}

function readLine(d,best,worst,med,unit){
  const u=function(v){return (+v).toLocaleString(undefined,{maximumFractionDigits:3})+unit};
  if(!best||!best.n)return '';
  const dir=(d.higher_is_better===false)?'lowest':'highest';
  return '<b>'+esc(best.n)+'</b> posts the '+dir+' figure in the league at <b>'+u(best.v)+
    '</b>, against a median of <b>'+u(med)+'</b> — roughly '+
    (med&&+med!==0?(Math.abs(+best.v/+med)).toFixed(1)+'×':'well clear of')+
    ' the typical player. At the other end, <b>'+esc(worst.n)+'</b> records '+u(worst.v)+
    '. Click either card to see the full profile and the actions behind the number.';
}

/* Honest notes where a metric has a real limitation */
function caveat(k){
  const C={
    xg_90:'The model is fitted on this season only and validated against Opta at r=0.975 across the 30 teams. It cannot see defenders, keeper position, or whether the shot was first-time, so two shots from the same spot get the same value unless the big-chance flag separates them.',
    xg_per_shot:'Driven heavily by where a player shoots from. A poacher will beat a midfielder here without being the better finisher.',
    finishing:'Over a partial season this is mostly noise. It takes several hundred shots before over- or under-performance means much.',
    sot_90:'The provider files a defender\u2019s block as a save. Those are excluded here, which is why this reads lower than most public sources.',
    carries_90:'Carries are not in the raw feed. They are inferred from the gap between where the ball arrived and where the player\u2019s next action began, capped at 20 seconds.',
    median_ttr:'Includes every receipt, not just passes. A player who is dispossessed often will look slower than he is.',
    aq_per_duel:'Follows only the single next event. A ball that is scrambled clear and then recovered still counts as lost.',
    padj_def_90:'The adjustment matters far more between teams than within one. Two players at the same club get almost the same correction.',
    sp_xg_90:'A set-piece phase counts the ten seconds after any dead ball, including throw-ins, so this runs slightly generous versus a corners-and-free-kicks-only definition.',
    def_height:'A high figure can mean an aggressive press or simply a team pinned in the opposition half. Read it next to PPDA.',
    goals_prevented_90:'Uses pre-shot xG, not post-shot. It does not know how well the shot was struck.',
    weak_foot_share:'Foot is recorded on about four shots in five, so this is based on a subset.',
    hs_passes_90:'Half-spaces here are the strips between the box edge and the six-yard line extended, attacking half only.'
  };
  return C[k]||'';
}
init();
</script>
</body>
</html>
