name: Auto-scrape new matches

on:
  schedule:
    - cron: '0 6 */3 * *'  # Every 3 days at 6am UTC
  workflow_dispatch:  # Allow manual trigger from GitHub UI

jobs:
  scrape:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install -r pipeline/requirements.txt

      - name: Set up Chrome
        uses: browser-actions/setup-chrome@v1

      - name: Scrape Arsenal PL
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
        run: |
          cd pipeline
          python scrape_and_load.py --league "ENG-Premier League" --season 2526 --team Arsenal

      - name: Scrape Arsenal Champions League
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
        run: |
          cd pipeline
          python scrape_and_load.py --league "INT-Champions League" --season 2526 --team Arsenal

      - name: Scrape Arsenal FA Cup
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
        run: |
          cd pipeline
          python scrape_and_load.py --league "ENG-FA Cup" --season 2526 --team Arsenal

      - name: Scrape Arsenal League Cup
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
        run: |
          cd pipeline
          python scrape_and_load.py --league "ENG-League Cup" --season 2526 --team Arsenal

      - name: Scrape LAFC MLS
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
        run: |
          cd pipeline
          python scrape_and_load.py --league "USA-MLS" --season 2627 --team "Los Angeles FC"
